# Ruff 全仓库 lint/format 配置
#
# 背景：历史上 ruff 仅覆盖 Code/backend/app 与 Code/algorithms/.../algorithms 两处，
# Tools/、Code/shared/、Code/algorithms 其余包、后端 tests/scripts/入口脚本、根脚本
# 均未纳入检查（见 .pre-commit-config.yaml 的 files 说明）。本配置将 ruff 覆盖范围扩展
# 到全部一方（first-party）Python，并对少数“有意为之”的模式以 per-file-ignores + 原因
# 注释方式记录豁免，避免误伤一次性运维脚本与测试代码，同时保留对真实缺陷的检查能力。
#
# 规则集：沿用 ruff 默认（E4/E7/E9/F，即 pyflakes + pycodestyle 子集），不额外开启规则，
# 因此已覆盖模块（app/*、algorithms/*）行为不变，仅新增目录被纳入检查。
# 行宽/格式：保持 ruff 默认（88），避免对既有已格式化代码产生 reflow 噪音。

target-version = "py312"

# 排除：Matlab 目录下为 MATLAB 移植/生成的 .py（只读、未纳入 git 维护），不做 lint/format。
extend-exclude = [
  "Code/algorithms/providers/Matlab",
]

[lint.per-file-ignores]
# 一次性运维/数据脚本（下载、导出、校验、巡检等）：
#   E402 允许在 sys.path/环境引导后再导入；E722 保留防御式裸 except；
#   F841 保留探索期未消费的中间量；F401 允许“可用性探测”式导入；E741 容忍数学脚本短变量名。
"Tools/**" = ["E402", "E722", "F841", "E741", "F401"]

# 应用入口脚本：需在导入前完成 sys.path/环境变量引导，故允许模块级导入不在文件顶部（E402）。
"Code/backend/start_*.py" = ["E402"]
"start_backend.py" = ["E402"]

# 端到端联调脚本：保留读取但暂不消费的中间量以便交互式排障。
"Code/backend/test_celery_e2e.py" = ["F841"]

# 测试代码：夹具/断言常保留中间量（F841），用例内按需在导入前设置运行环境（E402）。
"**/tests/**" = ["F841", "E402"]

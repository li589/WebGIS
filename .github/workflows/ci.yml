# ──────────────────────────────────────────────────────────────────────────────
# Minimum CI workflow
# 触发条件：push 至 dev / main，或 PR 目标为 dev / main
# 质量门：pre-commit (全量) + pytest + vitest + check:openapi
# ──────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── pre-commit：lint / 格式化 / 通用钩子 ──────────────────────────────────
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Code/frontend/package-lock.json

      - name: Install frontend deps (for eslint / prettier hooks)
        working-directory: Code/frontend
        run: npm ci --prefer-offline

      - name: Run pre-commit (all files)
        uses: pre-commit/action@v3.0.1

  # ── pytest：后端单元 / 集成测试 ───────────────────────────────────────────
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    needs: pre-commit
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            Code/backend/requirements.txt
            Code/backend/requirements-dev.txt

      - name: Install backend deps
        working-directory: Code/backend
        run: |
          pip install -r requirements-dev.txt
          pip install pytest pytest-cov

      - name: Run pytest
        working-directory: Code/backend
        env:
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: pytest tests/ -x --tb=short -q

  # ── vitest：前端单元测试 ──────────────────────────────────────────────────
  vitest:
    name: vitest
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Code/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: Code/frontend
        run: npm ci --prefer-offline

      - name: Run vitest
        working-directory: Code/frontend
        run: npm run test

  # ── check:openapi：前后端契约漂移检测 ──────────────────────────────────────
  check-openapi:
    name: check:openapi
    runs-on: ubuntu-latest
    needs: pre-commit
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            Code/backend/requirements.txt
            Code/backend/requirements-dev.txt

      - name: Install backend deps
        working-directory: Code/backend
        run: pip install -r requirements.txt

      - name: Run check:openapi
        working-directory: Code/frontend
        env:
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: npm run check:openapi

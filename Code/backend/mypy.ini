# mypy config (ASCII-only so Windows locale/GBK hooks can parse the file)
# Permissive baseline: pre-commit must not fail the whole tree while typed
# coverage is still being rolled out. Tighten module-by-module later.

[mypy]
python_version = 3.12
ignore_errors = True
ignore_missing_imports = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = False
warn_return_any = False
warn_unused_ignores = False

# mypy 严格配置（Sprint 4.1）
#
# 设计目标：在不一次性引入大量类型错误噪音的前提下，对核心模块（app/*, algorithms/*）
# 启用 disallow_untyped_defs，逐步收紧全项目类型检查。
#
# 使用方式：
#   cd Code/backend
#   mypy --config-file mypy.ini app/
#   mypy --config-file mypy.ini ../algorithms/providers/Python/algorithms/
#
# CI 集成：pre-commit 钩子（.pre-commit-config.yaml）会调用此配置。

[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False  # 全局默认 False，仅对 app/* 和 algorithms/* 收紧
ignore_missing_imports = True  # scipy/numpy/cryptography 等第三方无 stub
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True
check_untyped_defs = True  # 即使函数无注解也检查函数体
show_error_codes = True
pretty = True

# 核心业务模块：强制要求类型注解
[mypy.app.*]
disallow_untyped_defs = True

[mypy.algorithms.*]
disallow_untyped_defs = True

# 测试与脚本：宽松处理
[mypy.app.tests.*]
disallow_untyped_defs = False

[mypy.app.*.scripts.*]
disallow_untyped_defs = False

# 第三方无 stub 的模块显式忽略（避免 noise）
[mypy-cryptography.*]
ignore_missing_imports = True

[mypy-CELERY.*]
ignore_missing_imports = True

[mypy-celery.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-rasterio.*]
ignore_missing_imports = True

[mypy-geojson.*]
ignore_missing_imports = True

[mypy-pyproj.*